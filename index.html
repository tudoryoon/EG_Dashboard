<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EG Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260513-1" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-badge">EG</div>
          <div>
            <h1>EG Dashboard</h1>
            <p class="brand-meta">
              Updated 14/04/2026 17:05
            </p>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="toolbar-row toolbar-row-country">
          <div class="country-switch" id="country-switch"></div>
        </div>
        <div class="toolbar-row toolbar-row-subtab">
          <div class="chip-row" id="subtab-switch"></div>
        </div>
        <div class="toolbar-row toolbar-row-filters">
          <label class="searchbox">
            <input
              id="search-input"
              type="search"
              placeholder="Search company..."
              aria-label="Search company"
            />
          </label>
          <label class="sortbox">
            <select id="sort-select" aria-label="Sort companies">
              <option value="marketCapDesc">Market Cap ↓</option>
              <option value="marketCapAsc">Market Cap ↑</option>
              <option value="nameAsc">Name A-Z</option>
            </select>
          </label>
          <div class="currency-switch" id="currency-switch"></div>
        </div>
        <div class="chip-row" id="sector-chips"></div>
      </section>

      <section class="summary-row">
        <p class="summary-text" id="summary-text"></p>
      </section>

      <main>
        <section class="us-overview hidden" id="us-overview"></section>
        <section class="card-grid" id="company-grid"></section>
      </main>
    </div>

    <template id="company-card-template">
      <article class="company-card">
        <div class="card-head">
          <div>
            <h2 class="company-name"></h2>
            <div class="metric-line">
              <span class="revenue-value"></span>
              <span class="latest-revenue-value"></span>
              <span class="delta mom-value"></span>
              <span class="delta yoy-value"></span>
            </div>
            <div class="metric-caption">
              <span class="reporting-month"></span>
              <span>Market Cap</span>
              <span>Revenue</span>
              <span>MoM</span>
              <span>YoY</span>
            </div>
          </div>
          <span class="sector-pill"></span>
        </div>

        <div class="chart-panel">
          <div class="chart-wrap">
            <canvas class="revenue-chart"></canvas>
          </div>
          <p class="axis-caption">월별 추이</p>
        </div>

        <div class="divider"></div>

        <section class="trend-panel">
          <p class="trend-title">YoY by Year</p>
          <div class="chart-wrap">
            <canvas class="yearly-chart"></canvas>
          </div>
          <p class="axis-caption">월 구간 기준 비교</p>
        </section>
      </article>
    </template>

    <script src="./data/dashboard-data.js?v=20260513-2"></script>
    <script src="./data/us-overview-data.js?v=20260504-7"></script>
    <script src="./data/cloud-data.js?v=20260430-1"></script>
    <script src="./data/capex-data.js?v=20260513-1"></script>
    <script src="./data/memory-spot-data.js"></script>
    <script src="./data/memory-spot-history.js"></script>
    <script src="./data/gpu-cloud-data.js"></script>
    <script src="./data/gpu-cloud-history.js"></script>
    <script src="./data/m7-price-data.js"></script>
    <script src="./data/market-price-data.js?v=20260513-1"></script>
    <script src="./data/market-macro-data.js?v=20260513-8"></script>
    <script src="./data/market-vix-data.js?v=20260508-1"></script>
    <script src="./data/macro-indicators-data.js?v=20260513-1"></script>
    <script src="./data/market-briefing-data.js?v=20260503-6"></script>
    <script src="./data/market-rs-data.js?v=20260504-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./dashboard.js?v=20260513-12" defer></script>
  </body>
</html>
