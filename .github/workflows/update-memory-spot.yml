name: Update Memory Spot

on:
  workflow_dispatch:
  schedule:
    - cron: "40 21 * * *"

permissions:
  contents: write

jobs:
  update-memory-spot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh memory spot history
        run: python scripts/update_memory_spot.py

      - name: Commit updated memory spot history
        run: |
          if git diff --quiet -- data/memory-spot-history.js; then
            echo "No memory spot changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/memory-spot-history.js
          git commit -m "Update memory spot history"
          git push
