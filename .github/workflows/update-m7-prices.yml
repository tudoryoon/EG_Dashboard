name: Update M7 And Market Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: write

jobs:
  update-m7-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh M7 price history
        run: python scripts/update_m7_prices.py

      - name: Refresh market price history
        run: python scripts/update_market_prices.py

      - name: Refresh market macro history
        run: python scripts/update_market_macro.py

      - name: Commit updated price history
        run: |
          if git diff --quiet -- data/m7-price-data.js data/market-price-data.js data/market-macro-data.js; then
            echo "No M7, market, or macro price changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/m7-price-data.js data/market-price-data.js data/market-macro-data.js
          git commit -m "Update M7, market, and macro price history"
          git push
