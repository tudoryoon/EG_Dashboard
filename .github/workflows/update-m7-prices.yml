name: Update M7 And Market Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "40 21 * * *"

permissions:
  contents: write

jobs:
  update-m7-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install RS dependencies
        run: python -m pip install pandas yfinance requests lxml html5lib

      - name: Refresh M7 price history
        run: python scripts/update_m7_prices.py

      - name: Refresh market price history
        run: python scripts/update_market_prices.py

      - name: Refresh market macro history
        run: python scripts/update_market_macro.py

      - name: Refresh market briefing
        run: python scripts/update_market_briefing.py

      - name: Refresh market RS history
        env:
          MARKET_RS_MAX_SHARES_FETCH: "250"
        run: python scripts/update_market_rs.py

      - name: Commit updated price history
        run: |
          if git diff --quiet -- data/m7-price-data.js data/market-price-data.js data/market-macro-data.js data/market-briefing-data.js data/market-rs-data.js; then
            echo "No M7, market, macro, briefing, or RS price changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/m7-price-data.js data/market-price-data.js data/market-macro-data.js data/market-briefing-data.js data/market-rs-data.js
          git commit -m "Update M7, market, macro, briefing, and RS price history"
          git push
