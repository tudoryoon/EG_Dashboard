name: Update Macro Data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 16 * * *"

permissions:
  contents: write

jobs:
  update-macro-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install requests beautifulsoup4

      - name: Refresh macro indicator data
        run: python scripts/update_macro_data.py

      - name: Commit updated macro data
        run: |
          if git diff --quiet -- data/macro-indicators-data.js; then
            echo "No macro data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/macro-indicators-data.js
          git commit -m "chore: update macro data"
          git push
