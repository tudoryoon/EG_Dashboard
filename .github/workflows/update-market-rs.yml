name: Update Market RS

on:
  workflow_dispatch:
  schedule:
    - cron: "40 21 * * *"

permissions:
  contents: write

jobs:
  update-market-rs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pandas yfinance requests lxml html5lib

      - name: Refresh market RS history
        env:
          MARKET_RS_MAX_SHARES_FETCH: "250"
        run: python scripts/update_market_rs.py

      - name: Commit updated market RS history
        run: |
          if git diff --quiet -- data/market-rs-data.js; then
            echo "No market RS changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-rs-data.js
          git commit -m "Update market RS history" || exit 0
          git pull --rebase origin main
          git push
