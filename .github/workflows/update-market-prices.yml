name: Update Market Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "40 21 * * *"

permissions:
  contents: write

jobs:
  update-market-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pandas yfinance requests lxml html5lib openpyxl

      - name: Refresh market price history
        run: |
          python scripts/update_market_prices.py
          python scripts/update_market_macro.py
          python scripts/update_market_vix.py

      - name: Commit updated market price history
        run: |
          if git diff --quiet -- data/market-price-data.js data/market-macro-data.js data/market-vix-data.js; then
            echo "No market price, macro, or VIX changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-price-data.js data/market-macro-data.js data/market-vix-data.js
          git commit -m "Update market price, macro, and VIX history" || exit 0
          git pull --rebase origin main
          git push
