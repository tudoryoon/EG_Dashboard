name: Update Market Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "35 22 * * *"

permissions:
  contents: write

jobs:
  update-market-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh market price history
        run: python scripts/update_market_prices.py

      - name: Commit updated market price history
        run: |
          if git diff --quiet -- data/market-price-data.js; then
            echo "No market price changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-price-data.js
          git commit -m "Update market price history"
          git push
