name: Update Market Briefing

on:
  workflow_dispatch:
  schedule:
    - cron: "50 21 * * *"

permissions:
  contents: write

jobs:
  update-market-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install briefing dependencies
        run: python -m pip install pandas yfinance requests

      - name: Refresh market briefing
        run: python scripts/update_market_briefing.py

      - name: Commit updated market briefing
        run: |
          if git diff --quiet -- data/market-briefing-data.js; then
            echo "No market briefing changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-briefing-data.js
          git commit -m "chore: update market briefing"
          git push
